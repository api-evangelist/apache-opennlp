aid: apache-opennlp
name: Apache OpenNLP
description: >-
  Apache OpenNLP is a machine learning based toolkit for the processing of natural language text. It supports common NLP tasks such as tokenization, sentence segmentation, part-of-speech tagging, named
  entity extraction, chunking, parsing, and coreference resolution.
